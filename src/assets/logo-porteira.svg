<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Porteira Esquerda -->
  <g id="porteira-left">
    <!-- Estrutura vertical -->
    <rect x="120" y="90" width="12" height="200" fill="#5c4033" rx="2"/>
    <rect x="260" y="90" width="12" height="200" fill="#5c4033" rx="2"/>
    
    <!-- Travessas horizontais -->
    <rect x="120" y="100" width="152" height="12" fill="#5c4033" rx="2"/>
    <rect x="120" y="145" width="152" height="12" fill="#5c4033" rx="2"/>
    <rect x="120" y="190" width="152" height="12" fill="#5c4033" rx="2"/>
    <rect x="120" y="235" width="152" height="12" fill="#5c4033" rx="2"/>
    <rect x="120" y="280" width="152" height="12" fill="#5c4033" rx="2"/>
    
    <!-- Diagonais -->
    <line x1="140" y1="100" x2="250" y2="155" stroke="#5c4033" stroke-width="10" stroke-linecap="round"/>
    <line x1="170" y1="190" x2="260" y2="240" stroke="#5c4033" stroke-width="10" stroke-linecap="round"/>
  </g>
  
  <!-- Porteira Direita -->
  <g id="porteira-right">
    <!-- Estrutura vertical -->
    <rect x="328" y="90" width="12" height="200" fill="#5c4033" rx="2"/>
    <rect x="468" y="90" width="12" height="200" fill="#5c4033" rx="2"/>
    
    <!-- Travessas horizontais -->
    <rect x="328" y="100" width="152" height="12" fill="#5c4033" rx="2"/>
    <rect x="328" y="145" width="152" height="12" fill="#5c4033" rx="2"/>
    <rect x="328" y="190" width="152" height="12" fill="#5c4033" rx="2"/>
    <rect x="328" y="235" width="152" height="12" fill="#5c4033" rx="2"/>
    <rect x="328" y="280" width="152" height="12" fill="#5c4033" rx="2"/>
    
    <!-- Diagonais -->
    <line x1="348" y1="100" x2="458" y2="155" stroke="#5c4033" stroke-width="10" stroke-linecap="round"/>
    <line x1="378" y1="190" x2="468" y2="240" stroke="#5c4033" stroke-width="10" stroke-linecap="round"/>
  </g>
  
  <!-- Texto "PORTEIRA ADENTRO" -->
  <text x="300" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#1d5016" text-anchor="middle" letter-spacing="2">
    PORTEIRA ADENTRO
  </text>
  
  <!-- Linha decorativa abaixo -->
  <line x1="150" y1="365" x2="450" y2="365" stroke="#5c4033" stroke-width="8" stroke-linecap="round"/>
</svg>
